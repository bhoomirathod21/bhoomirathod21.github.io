<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bhoomi21 - Portfolio</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Scroll trigger area -->
  <div class="scroll-trigger" id="scroll-trigger">
    <div class="scroll-content"></div>
  </div>

  <!-- Hero profile image -->
  <img src="https://randomuser.me/api/portraits/women/44.jpg" class="hero-profile-img" id="hero-profile-img" alt="Bhoomi21 Profile">

  <!-- Header -->
  <header id="main-header">
    <div class="container">
      <div class="logo">BHOOMI</div>
      <nav>
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#portfolio">Portfolio</a></li>
          <li><a href="#services">Services</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1 id="hero-title">BOOMI RATHOD</h1>
      <h3 id="hero-subtitle">UI/UX DESIGNER</h3>
      <p class="hero-description">Creating beautiful and functional digital experiences</p>
    </div>
    <a href="#contact" class="cta-btn">Get In Touch</a>
    
    <!-- Social Media Links -->
    <div class="social-links">
      <a href="#" class="social-link">LinkedIn</a>
      <a href="#" class="social-link">Behance</a>
      <a href="#" class="social-link">Dribbble</a>
    </div>
    
    <!-- Scroll indicator -->
    <div class="scroll-indicator">
      <span>Scroll to explore</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- Background Elements -->
  <div class="bg-elements">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
  </div>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
